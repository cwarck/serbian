<script>
/* Cases — data is structural; UI text comes from window.I18N per case key.
   Endings shown as the ending only (-a, not "žena -a"). Shared / animacy /
   sound-change overlays surface the system, not the noise. */

/* Cell shape:
     string         e.g. '-a'
     { v, same }    ending value + "same as X" marker  (X = NOM | GEN | DAT)
     { v, n }       ending + footnote id (resolved against .notes below)
     { split: [{label,v,same}, ...] }   animacy / soft-consonant alternation
*/

const CASES = [
  {
    key: 'case.1', abbr: 'NOM', tone: 'nom',
    sigEnding: '-∅',
    endings: {
      m: { sg: '-∅',               pl: { v:'-i', n:'sib-i' } },
      f: { sg: '-a',                pl: '-e' },
      n: { sg: '-o',                pl: '-a' },
    },
    notes: {
      'sib-i': {
        titleEn: 'k, g, h soften before -i',
        titleRu: 'k, g, h смягчаются перед -i',
        bodyEn: 'These three hard consonants don\'t sit comfortably next to a bright -i. They shift to softer cousins — c, z, s — that match the vowel better.',
        bodyRu: 'Этим трём твёрдым согласным неудобно стоять перед «светлым» -i. Они меняются на мягких родственников — c, z, s — которым с -i легче.',
        pairs: [['junak','junaci'],['jezik','jezici'],['monah','monasi']]
      }
    },
    examples: [
      { sr:'<mark>Dobar pilot</mark> proverava instrumente.', en:'A good pilot checks the instruments.', ru:'Хороший пилот проверяет приборы.' },
      { sr:'<mark>Žena</mark> peva.',                   en:'The woman sings.',               ru:'Женщина поёт.' },
      { sr:'<mark>Selo</mark> je tiho.',                en:'The village is quiet.',          ru:'Деревня тихая.' },
    ],
    preps: []
  },

  {
    key: 'case.2', abbr: 'GEN', tone: 'gen',
    sigEnding: '-a',
    endings: {
      m: { sg: '-a',                pl: '-a' },
      f: { sg: '-e',                pl: '-∅' },
      n: { sg: '-a',                pl: '-a' },
    },
    notes: {},
    examples: [
      { sr:'Kaciga <mark>pilota</mark>.',        en:'The pilot\'s helmet.',         ru:'Шлем пилота.' },
      { sr:'Stižem iz <mark>grada</mark>.',       en:'I\'m arriving from the city.', ru:'Я приезжаю из города.' },
      { sr:'Nemam <mark>vremena</mark>.',         en:'I have no time.',              ru:'У меня нет времени.' },
    ],
    preps: [
      { p:'od',    en:'from (a person, a starting point)',    ru:'от (человека, начальной точки)', group:'origin' },
      { p:'iz',    en:'out of, from inside',                  ru:'из (изнутри)',                    group:'origin' },
      { p:'do',    en:'to / up to (a destination, a limit)',  ru:'до (предела, конечной точки)',    group:'origin' },
      { p:'kod',   en:'at (someone\'s place), by, near',      ru:'у (кого-то), возле',              group:'position' },
      { p:'blizu', en:'close to',                             ru:'близ, рядом с',                   group:'position' },
      { p:'iza',   en:'behind',                               ru:'за, позади',                      group:'position' },
      { p:'oko',   en:'around, about',                        ru:'вокруг, около',                   group:'position' },
      { p:'bez',   en:'without',                              ru:'без',                             group:'absence' },
      { p:'pre',   en:'before',                               ru:'до, перед',                       group:'absence' },
      { p:'posle', en:'after',                                ru:'после',                           group:'absence' },
    ]
  },

  {
    key: 'case.3', abbr: 'DAT', tone: 'dat',
    sigEnding: '-u',
    pluralBannerKey: 'cases.dat.plural.banner',
    endings: {
      m: { sg: '-u',                pl: { v:'-ima', share:['INS','LOK'] } },
      f: { sg: { v:'-i', n:'sib-i' }, pl: { v:'-ama', share:['INS','LOK'] } },
      n: { sg: '-u',                pl: { v:'-ima', share:['INS','LOK'] } },
    },
    notes: {
      'sib-i': {
        titleEn: 'k, g, h soften before the -i ending',
        titleRu: 'k, g, h смягчаются перед -i',
        bodyEn: 'When the feminine singular ending -i lands on a stem ending in k, g, or h, those hard consonants shift to c, z, s — softer sounds that sit better next to the -i.',
        bodyRu: 'Когда женское окончание -i падает на основу, оканчивающуюся на k, g или h, эти твёрдые согласные меняются на c, z, s — более мягкие звуки, которые лучше ладят с -i.',
        pairs: [['knjiga','knjizi'],['ruka','ruci'],['Amerika','Americi']]
      }
    },
    examples: [
      { sr:'Pokazujem kartu <mark>pilotu</mark>.', en:'I show the map to the pilot.',      ru:'Я показываю карту пилоту.' },
      { sr:'Idem k <mark>moru</mark>.',             en:'I\'m going to the sea.',            ru:'Я еду к морю.' },
      { sr:'Pomažem <mark>prijateljici</mark>.',    en:'I\'m helping a friend (f.).',       ru:'Я помогаю подруге.' },
    ],
    preps: [
      { p:'k, ka',     en:'towards (a destination, a person)',  ru:'к (направлению, к кому-либо)' },
      { p:'prema',     en:'toward, facing',                     ru:'к, по направлению к' },
      { p:'nasuprot',  en:'opposite, across from',              ru:'напротив' },
    ]
  },

  {
    key: 'case.4', abbr: 'AKU', tone: 'aku',
    sigEnding: '-a / -∅',
    bannerKey: 'cases.aku.banner',
    endings: {
      m: {
        sg: { split: [
          { v:'-a', n:'animacy', labelKey:'cases.aku.label.alive' },
          { v:'-∅', n:'animacy', labelKey:'cases.aku.label.thing' },
        ] },
        pl: '-e'
      },
      f: { sg: '-u',                pl: '-e' },
      n: { sg: { v:'-o', same:'NOM' }, pl: { v:'-a', same:'NOM' } },
    },
    notes: {
      'animacy': {
        titleEn: 'Living things vs everything else',
        titleRu: 'Одушевлённые против всего остального',
        bodyEn: 'In the masculine singular only, the accusative splits by whether the noun is alive. Living things (people, animals) take -a — the same shape as the genitive. Inanimate things take -∅ — the nominative form, unchanged. So you reuse two endings you already know.',
        bodyRu: 'Только в мужском роде единственного числа винительный делится по одушевлённости. У живых (люди, животные) окончание -a — точно как в родительном. У неодушевлённых — -∅, как в именительном. То есть переиспользуются уже знакомые окончания.',
        pairs: [['pilot','pilota'],['grad','grad']]
      }
    },
    examples: [
      { sr:'Vidim <mark>pilota</mark>.',    en:'I see the pilot. <em>(living → -a, like Gen)</em>',     ru:'Я вижу пилота. <em>(одуш. → -a, как Род.)</em>' },
      { sr:'Vidim <mark>grad</mark>.',       en:'I see the city. <em>(non-living → -∅, like Nom)</em>', ru:'Я вижу город. <em>(неодуш. → -∅, как Им.)</em>' },
      { sr:'Idem u <mark>grad</mark>.',      en:'I\'m going to the city. <em>(motion: u + Acc)</em>',  ru:'Я еду в город. <em>(движение: u + Acc)</em>' },
    ],
    preps: [
      { p:'u',     en:'into (with motion verbs)',          ru:'в (при движении)',                    group:'motion-flow' },
      { p:'na',    en:'onto (with motion verbs)',          ru:'на (при движении)',                   group:'motion-flow' },
      { p:'kroz',  en:'through',                           ru:'сквозь, через',                        group:'motion-flow' },
      { p:'niz',   en:'down (along)',                      ru:'вниз по',                              group:'motion-flow' },
      { p:'uz',    en:'up (along), beside',                ru:'вверх по, вдоль',                       group:'motion-flow' },
      { p:'pod',   en:'under (with motion: going under)',  ru:'под (при движении)',                  group:'motion-position' },
      { p:'pred',  en:'in front of (with motion)',         ru:'перед (при движении)',                group:'motion-position' },
      { p:'nad',   en:'over (with motion)',                ru:'над (при движении)',                  group:'motion-position' },
      { p:'među',  en:'among (with motion)',               ru:'между, среди (при движении)',          group:'motion-position' },
      { p:'za',    en:'for, after (a duration / a goal)',  ru:'за, на (срок, цель)',                  group:'purpose-time' },
    ]
  },

  {
    key: 'case.5', abbr: 'VOK', tone: 'vok',
    sigEnding: '-e / -u',
    endings: {
      m: {
        sg: { split: [
          { v:'-e', n:'palatal' },
          { v:'-u', n:'soft' },
        ] },
        pl: { v:'-i', same:'NOM' }
      },
      f: { sg: '-o',                pl: { v:'-e', same:'NOM' } },
      n: { sg: { v:'-o', same:'NOM' }, pl: { v:'-a', same:'NOM' } },
    },
    notes: {
      'palatal': {
        titleEn: 'k, g, h turn into č, ž, š when calling out',
        titleRu: 'k, g, h превращаются в č, ž, š при обращении',
        bodyEn: 'When you address someone whose word ends in k, g, or h, those consonants shift to their soft cousins — č, ž, š — before the -e ending. The hard sounds soften because you\'re calling, not stating.',
        bodyRu: 'Когда зовут кого-то, чьё имя или должность оканчивается на k, g, h, эти согласные меняются на мягких родственников — č, ž, š — перед окончанием -e. Звук размягчается, потому что это окрик, а не утверждение.',
        pairs: [['junak','junače'],['Bog','Bože'],['duh','duše']]
      },
      'soft': {
        titleEn: 'After soft consonants, use -u instead of -e',
        titleRu: 'После мягких согласных — -u вместо -e',
        bodyEn: 'If the word already ends in a soft consonant — c, ć, č, đ, dž, j, lj, nj, š, ž — adding a soft -e on top would feel doubled. The ending switches to -u instead.',
        bodyRu: 'Если слово уже оканчивается на мягкий согласный — c, ć, č, đ, dž, j, lj, nj, š, ž — добавлять сверху мягкое -e было бы излишеством. Окончание становится -u.',
        pairs: [['prijatelj','prijatelju'],['mladić','mladiću'],['muž','mužu']]
      }
    },
    examples: [
      { sr:'<mark>Pilote</mark>, dobar dan!',    en:'Pilot, hello!',             ru:'Пилот, добрый день!' },
      { sr:'<mark>Marija</mark>, gde si?',         en:'Marija, where are you?',    ru:'Мария, ты где?' },
      { sr:'O, <mark>prijatelju</mark>!',         en:'Oh, my friend!',            ru:'О, друг мой!' },
    ],
    preps: []
  },

  {
    key: 'case.6', abbr: 'INS', tone: 'ins',
    sigEnding: '-om',
    pluralBannerKey: 'cases.ins.plural.banner',
    endings: {
      m: { sg: { v:'-om', n:'soft-em' }, pl: { v:'-ima', share:['DAT','LOK'] } },
      f: { sg: '-om',                     pl: { v:'-ama', share:['DAT','LOK'] } },
      n: { sg: { v:'-om', n:'soft-em' }, pl: { v:'-ima', share:['DAT','LOK'] } },
    },
    notes: {
      'soft-em': {
        titleEn: 'After soft consonants, -om becomes -em',
        titleRu: 'После мягких согласных -om становится -em',
        bodyEn: 'The round -om feels heavy when it follows a soft consonant (c, ć, č, đ, dž, j, lj, nj, š, ž). It thins to -em so the word stays balanced — soft consonant, soft vowel.',
        bodyRu: 'Округлое -om кажется тяжёлым после мягкого согласного (c, ć, č, đ, dž, j, lj, nj, š, ž). Оно превращается в -em, чтобы слово оставалось лёгким — мягкий согласный, мягкий гласный.',
        pairs: [['muž','mužem'],['nož','nožem'],['mesec','mesecem']]
      }
    },
    examples: [
      { sr:'Putujem <mark>autobusom</mark>.',  en:'I\'m traveling by bus.',     ru:'Я еду на автобусе.' },
      { sr:'Letim sa <mark>pilotom</mark>.',    en:'I\'m flying with the pilot.', ru:'Я лечу с пилотом.' },
      { sr:'<mark>Ponedeljkom</mark> radim.',  en:'On Mondays I work. <em>(recurring time)</em>', ru:'По понедельникам я работаю. <em>(регулярное время)</em>' },
    ],
    preps: [
      { p:'s, sa', en:'with (company)',                       ru:'с (вместе с)',                  group:'company' },
      { p:'pod',   en:'under (location, no motion)',          ru:'под (где, без движения)',       group:'static' },
      { p:'pred',  en:'in front of (location, no motion)',    ru:'перед (где, без движения)',     group:'static' },
      { p:'nad',   en:'over, above (location, no motion)',    ru:'над (где, без движения)',       group:'static' },
      { p:'među',  en:'among (location, no motion)',          ru:'между, среди (где)',            group:'static' },
      { p:'za',    en:'behind (location, no motion)',         ru:'за (где)',                       group:'static' },
    ]
  },

  {
    key: 'case.7', abbr: 'LOK', tone: 'lok',
    sigEnding: '-u',
    endings: {
      m: { sg: { v:'-u', same:'DAT' },               pl: { v:'-ima', same:'DAT' } },
      f: { sg: { v:'-i', same:'DAT', n:'sib-i' },     pl: { v:'-ama', same:'DAT' } },
      n: { sg: { v:'-u', same:'DAT' },               pl: { v:'-ima', same:'DAT' } },
    },
    notes: {
      'sib-i': {
        titleEn: 'k, g, h soften before -i (same as Dative)',
        titleRu: 'k, g, h смягчаются перед -i (как в Дательном)',
        bodyEn: 'The Locative singular ending for feminines is -i — exactly the same as Dative. Same ending, same softening: k, g, h become c, z, s when they meet it.',
        bodyRu: 'Окончание Предложного для женского рода единственного — то же -i, что и в Дательном. То же окончание, то же смягчение: k, g, h становятся c, z, s.',
        pairs: [['ruka','ruci'],['knjiga','knjizi'],['Amerika','Americi']]
      }
    },
    examples: [
      { sr:'Knjiga je na <mark>stolu</mark>.',      en:'The book is on the table. <em>(location)</em>',         ru:'Книга на столе. <em>(где)</em>' },
      { sr:'Govorim o <mark>pilotu</mark>.',        en:'I\'m speaking about the pilot. <em>(topic)</em>',       ru:'Я говорю о пилоте. <em>(о чём)</em>' },
      { sr:'Živim u <mark>Beogradu</mark>.',         en:'I live in Belgrade. <em>(location: u + Loc, no motion)</em>', ru:'Я живу в Белграде. <em>(где: u + Loc, без движения)</em>' },
    ],
    preps: [
      { p:'u',   en:'in (location), in (a month, a language)', ru:'в (где, в месяце, на языке)',          group:'location' },
      { p:'na',  en:'on, at (a place / event); in (a language)', ru:'на (поверхности, событии); на (языке)', group:'location' },
      { p:'o',   en:'about (a topic)',                          ru:'о, об (теме разговора)',              group:'topic' },
      { p:'po',  en:'all over; according to',                   ru:'по (всему); согласно',                group:'topic' },
      { p:'pri', en:'by, attached to (formal)',                 ru:'при (книжное)',                       group:'topic' },
    ]

];

const IDECL = {

/* Overrides for cells that don't follow the cast trio directly — chiefly the
   AKU and VOK splits, where the rule is ABOUT which subgroup the noun is in.
   Each entry: { caseAbbr:gender:number → [{labelKey?, from, to}, ...] } */
const VARIANT_EXAMPLES = {
  'AKU:m:sg': [
    { labelKey:'cases.aku.label.alive', from:'pilot',    to:'pilota'    },
    { labelKey:'cases.aku.label.thing', from:'grad',     to:'grad'      },

function dict() {
  const lang = document.documentElement.getAttribute('lang') || 'en';
  return (window.I18N && window.I18N[lang]) || {};
}
function tCases(key) { return dict()[key] || ''; }
function currentLang() { return document.documentElement.getAttribute('lang') || 'en'; }
function srText(text) {
  return window.AtlasSrpski ? window.AtlasSrpski.sr(text) : String(text);
}
function srHTML(html) {
  return window.AtlasSrpski ? window.AtlasSrpski.srHTML(html) : String(html);
}
function srEmHTML(html) {
  return String(html).replace(/<em>(.*?)<\/em>/g, (_, inner) => `<em>${srHTML(inner)}</em>`);
}
function srStrongHTML(html) {
  return String(html).replace(/<strong>(.*?)<\/strong>/g, (_, inner) => `<strong>${srHTML(inner)}</strong>`);
}
function srGrammarHTML(html) {
  const tokenPattern = /(?:k, g, h|c, z, s|č, ž, š|c, ć, č, đ, dž, j, lj, nj, š, ž|-ima\/-ama|-ima|-ama|-om|-em|-ov-|-ev-|-iju|-i|-e|-u|-a|\bPadeži\b|žena|\bpilot\b|\bselo\b|\bljubav\b|\bnoć\b|\bstvar\b|\breč\b|\bsmrt\b|\bkost\b|\bod\b|\biz\b|\bkod\b|\bMarko\b|\bProfesore\b|\bbrate\b)/g;
  return String(html)
    .split(/(<[^>]+>|&[^;\s]+;)/g)
    .map(part => (part.startsWith('<') || part.startsWith('&'))
      ? part
      : part.replace(tokenPattern, token => srText(token)))
    .join('');
}
function renderStaticGrammarTokens() {
  const lang = currentLang();
  document.querySelectorAll('[data-i18n^="cases."], [data-i18n^="wrinkle."]').forEach(node => {
    if (node.getAttribute('data-sr-grammar-lang') !== lang) {
      node.setAttribute('data-sr-grammar-source', node.innerHTML);
      node.setAttribute('data-sr-grammar-lang', lang);
    }
    node.innerHTML = srGrammarHTML(node.getAttribute('data-sr-grammar-source') || node.innerHTML);
  });
}

function caseAnchor(key) { return key.replace(/\./g,'-'); }

/* Spotlight changed letters in a sound-change pair: walk common prefix and
   suffix from both ends, wrap the divergent middle in <span class="lit">.
   Falls back to wrapping the whole word when the two share nothing. */
function diffHL(a, b) {
  const sa = String(a), sb = String(b);
  let p = 0;
  const minLen = Math.min(sa.length, sb.length);
  while (p < minLen && sa[p] === sb[p]) p++;
  let ea = sa.length, eb = sb.length;
  while (ea > p && eb > p && sa[ea-1] === sb[eb-1]) { ea--; eb--; }
  const wrap = (s, i, j) =>
    s.slice(0, i) + (i < j ? `<span class="lit">${s.slice(i, j)}</span>` : '') + s.slice(j);
  return { from: wrap(sa, p, ea), to: wrap(sb, p, eb) };
}

/* Resolve a popover's worth of word-pairs for a given cell.
   Falls back to the cast trio when no specific override exists.
   Returns [{ label?, from, to }, ...]. */
function getCellExamples(caseIdx, gender, number) {
  const c = CASES[caseIdx];
  const key = `${c.abbr}:${gender}:${number}`;
  if (VARIANT_EXAMPLES[key]) return VARIANT_EXAMPLES[key];
  const cast = CAST.find(x => x.gender === gender);
  if (!cast) return [];
  const from = cast.forms.sg[0];
  const to   = cast.forms[number][caseIdx];
  return [{ from, to }];
}

function popoverHTML(caseIdx, gender, number) {
  const d = dict();
  const c = CASES[caseIdx];
  const examples = getCellExamples(caseIdx, gender, number);
  const caseName = d[c.key + '.name']    || c.abbr;
  const genderName = d['cases.gender.' + gender] || gender;
  const numberName = d['cases.number.' + number] || number;
  const pairs = examples.map(ex => {
    const hl = diffHL(ex.from, ex.to);
    const label = ex.labelKey
      ? `<span class="pop-label">${d[ex.labelKey] || ''}</span>`

    return `

/* Convert a cell entry into HTML for the endings table.
   Always renders a `.cell` element — a button when tappable, a span when
   empty. Footnote IDs are appended to the case-id so anchors don't collide. */
function buildSharePills(entry) {
  const targets = [];
  if (entry && entry.same) targets.push(entry.same);
  if (entry && Array.isArray(entry.share)) targets.push(...entry.share);
  if (targets.length === 0) return '';
  const pills = targets.map(t => `
    <span class="cell-share" data-target="${t}" data-tone="${t.toLowerCase()}">
      <span class="share-label">${t}</span>
    </span>
  `).join('');
  return `<span class="cell-shares" aria-label="shared with">${pills}</span>`;
}

function cellHTML(entry, gender, caseId, caseIdx, number) {
  if (entry == null) return '<span class="cell cell-empty"><span class="end">—</span></span>';
  const data = `data-cell-trigger data-case-idx="${caseIdx}" data-gender="${gender}" data-number="${number}"`;
  if (typeof entry === 'string') {
    return `<button type="button" class="cell" ${data}><span class="end">${srText(entry)}</span></button>`;
  }
  const noteMark = (id, num) =>
    `<sup class="cell-note"><a href="#${caseId}-n-${id}" aria-label="see note">${num}</a></sup>`;

  if (entry.split) {
    const variants = entry.split;
    /* If every variant points to the same note, hoist one marker to the end
       so the cell reads `-a / -∅¹` rather than `-a¹ / -∅¹`. */
    const sharedNote = variants.every(s => s.n && s.n === variants[0].n)
      ? variants[0].n : null;
    const hasLabels = variants.some(s => s.labelKey);
    if (hasLabels) {
      const d = dict();
      const rows = variants.map((s, idx) => {
        const label = s.labelKey ? (d[s.labelKey] || '') : '';
        const m = !sharedNote && s.n ? noteMark(s.n, idx + 1) : '';
        return `
          <span class="end-row">
            <span class="cell-label">${label}</span>
            <span class="end">${srText(s.v)}${m}</span>
          </span>`;
      }).join('');
      const tail = sharedNote ? noteMark(sharedNote, 1) : '';
      return `<button type="button" class="cell cell-alt cell-alt-labeled" ${data}>${rows}${tail}</button>`;
    }
    const ends = variants.map((s, idx) => {
      const m = !sharedNote && s.n ? noteMark(s.n, idx + 1) : '';
      return `<span class="end">${srText(s.v)}${m}</span>`;
    }).join('<span class="cell-sep" aria-hidden="true">/</span>');
    const tail = sharedNote ? noteMark(sharedNote, 1) : '';
    return `<button type="button" class="cell cell-alt" ${data}>${ends}${tail}</button>`;
  }
  const pills = buildSharePills(entry);
  const note = entry.n ? noteMark(entry.n, 1) : '';
  return `<button type="button" class="cell" ${data}><span class="end">${srText(entry.v)}${note}</span>${pills}</button>`;
}

function renderCases() {
  const list = document.getElementById('caseList');
  const d = dict();
  if (!list) return;
  const lang = currentLang();
  list.innerHTML = CASES.map((c, i) => {
    const order   = String(i+1).padStart(2,'0');
    const caseId  = caseAnchor(c.key);
    const name    = d[c.key + '.name']    || '';
    const local   = srText(d[c.key + '.local'] || '');
    const tagline = d[c.key + '.tagline'] || '';
    const q       = srStrongHTML(d[c.key + '.q'] || '');

    /* If every singular and plural cell points to the same case via `same`,
       hoist that into a one-line banner above the table and strip the
       per-cell labels — clears the visual noise (notably the Locative).
       A case can also declare a custom banner via `bannerKey` (e.g., AKU
       animacy), which takes precedence. */
    const allCells = ['sg','pl'].flatMap(n => ['m','f','n'].map(g => c.endings[g][n]));
    const sameTargets = allCells.map(cell =>
      (cell && typeof cell === 'object' && !cell.split) ? cell.same : null
    );
    const uniformSame = sameTargets.every(t => t && t === sameTargets[0]) ? sameTargets[0] : null;
    let bannerHTML = '';
    if (c.bannerKey && d[c.bannerKey]) {
      bannerHTML = `<p class="endings-banner endings-banner-custom">${srGrammarHTML(d[c.bannerKey])}</p>`;
    } else if (uniformSame) {
      bannerHTML = `
        <p class="endings-banner">
          ${d['cases.endings.banner'] || 'Endings: same as'}
          <strong>${uniformSame}</strong>.
        </p>`;
    }
    /* Additional plural-row banner (DAT/INS announce -ima/-ama syncretism). */
    const pluralBannerHTML = (c.pluralBannerKey && d[c.pluralBannerKey])
      ? `<p class="endings-banner endings-banner-custom endings-banner-plural">${srGrammarHTML(d[c.pluralBannerKey])}</p>`
      : '';

    const cellHTMLClean = (entry, gender, number) => {
      if (uniformSame && entry && typeof entry === 'object' && !entry.split) {
        const { same, ...rest } = entry;
        return cellHTML(rest, gender, caseId, i, number);
      }
      return cellHTML(entry, gender, caseId, i, number);
    };

    const rowsHTML = ['sg','pl'].map(n => `
      <tr>
        <th scope="row" class="num">${d['cases.number.' + n] || (n === 'sg' ? 'Sg' : 'Pl')}</th>
        <td>${cellHTMLClean(c.endings.m[n], 'm', n)}</td>
        <td>${cellHTMLClean(c.endings.f[n], 'f', n)}</td>
        <td>${cellHTMLClean(c.endings.n[n], 'n', n)}</td>
      </tr>
    `).join('');

    const noteEntries = Object.entries(c.notes || {});
    const notesHTML = noteEntries.length === 0 ? '' : `
      <aside class="case-notes" aria-label="${d['cases.notes'] || 'Sound changes'}">
        <header class="notes-head">
          <span class="eyebrow">${d['cases.notes'] || 'Sound changes'}</span>
        </header>
        <div class="notes-list">
          ${noteEntries.map(([id, note]) => {
            const title = srGrammarHTML(lang === 'ru' ? note.titleRu : note.titleEn);
            const body  = srGrammarHTML(lang === 'ru' ? note.bodyRu  : note.bodyEn);
            const pairs = (note.pairs || []).map(p => {
              const hl = diffHL(p[0], p[1]);
              return `
                <li>
                  <span class="from">${srHTML(hl.from)}</span>
                  <span class="arrow" aria-hidden="true">→</span>
                  <span class="to">${srHTML(hl.to)}</span>
                </li>
              `;
            }).join('');
            return `
              <article class="note-item" id="${caseId}-n-${id}">
                <h4 class="note-title">${title}</h4>
                <p class="note-body">${body}</p>
                ${pairs ? `<ul class="note-pairs">${pairs}</ul>` : ''}
              </article>
            `;
          }).join('')}
        </div>
      </aside>
    `;

    const exHTML = c.examples.map(ex => `
      <div class="ex">
        <div class="sr">${srHTML(ex.sr)}</div>
        <div class="tr">${srGrammarHTML(ex[lang] || ex.en)}</div>
      </div>
    `).join('');

    /* If this case has a "from Russian" bridge defined in the current
       dictionary, render it between examples and prepositions. The key is
       only populated in RU mode, so EN visitors see nothing. */
    const bridgeText = d[c.key + '.bridge'];
    const bridgeHTML = bridgeText ? `
      <section class="case-bridge case-notes" aria-label="${d['cases.bridge.title'] || 'If you know Russian'}">
        <header class="notes-head">
          <span class="eyebrow">${d['cases.bridge.title'] || ''}</span>
        </header>
        <p class="bridge-text note-body">${srGrammarHTML(bridgeText)}</p>
      </section>` : '';

    const noPrepText = d['cases.preps.none.' + c.tone] || d['cases.preps.none'] || '';
    const prepHTML = c.preps.length === 0
      ? `<p class="preps-empty">${noPrepText}</p>`
      : `
        <dl class="prep-list">
          ${c.preps.map(pr => `
            <div class="prep-row">
              <dt class="prep-word">${srText(pr.p)}</dt>
              <dd class="prep-mean">${pr[lang] || pr.en}</dd>
            </div>
          `).join('')}
        </dl>
      `;

    return `
      <article class="case" id="${caseId}" data-tone="${c.tone}" role="tabpanel" tabindex="-1">
        <div class="case-side">
          <header class="case-head">
            <span class="case-tag">${c.abbr}</span>
            <h3>${name}<em title="${d['cases.local.tooltip'] || ''}">${local}</em></h3>
            <p class="tagline">${tagline}</p>
            <p class="q">${q}</p>
          </header>
          ${bridgeHTML}
        </div>
        <div class="case-body">
          <section class="endings">
            <header class="endings-head">
              <span class="eyebrow">${d['cases.endings'] || 'Endings'}</span>
            </header>
            ${bannerHTML}
            ${pluralBannerHTML}
            <table>
              <thead>
                <tr>
                  <th></th>
                  <th>${d['cases.gender.m'] || 'Masculine'}</th>
                  <th>${d['cases.gender.f'] || 'Feminine'}</th>
                  <th>${d['cases.gender.n'] || 'Neuter'}</th>
                </tr>
              </thead>
              <tbody>${rowsHTML}</tbody>
            </table>
            ${notesHTML}
          </section>
          <section class="case-right">
            ${castAnchorRowHTML(i, d)}
            <section class="case-block">
              <header class="endings-head">
                <span class="eyebrow">${d['cases.examples'] || 'In the wild'}</span>
              </header>
              <div class="examples">${exHTML}</div>
            </section>
            <section class="case-block preps">
              <header class="endings-head">
                <span class="eyebrow">${d['cases.preps'] || 'Used with'}</span>
              </header>
              ${prepHTML}
            </section>
          </section>
        </div>
      </article>
    `;
  }).join('');
}

function renderIDecl() {
  const root = document.getElementById('extraTable');
  if (!root) return;
  const d = dict();
  const rows = IDECL.cases.map((abbr, i) => `
    <tr>
      <th scope="row" class="num">${abbr}</th>
      <td><span class="end">${srText(IDECL.sg[i])}</span></td>
      <td><span class="end">${srText(IDECL.pl[i])}</span></td>
    </tr>
  `).join('');
  root.innerHTML = `
    <table class="i-decl">
      <thead>
        <tr>
          <th></th>
          <th>${d['cases.number.sg'] || 'Sg'}</th>
          <th>${d['cases.number.pl'] || 'Pl'}</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

function renderWrinkles() {
  const grid = document.getElementById('wrinkleGrid');
  if (!grid) return;
  const d = dict();
  const lang = currentLang();
  grid.innerHTML = WRINKLES.map(w => {
    const title = d[w.key + '.title'] || '';
    const intro = d[w.key + '.intro'] || '';
    const items = w.examples.map(ex => {
      const hl = diffHL(ex.from, ex.to);
      return `
        <li>
          <span class="from">${srHTML(hl.from)}</span>
          <span class="arrow" aria-hidden="true">→</span>
          <span class="to">${srHTML(hl.to)}</span>
          <span class="gloss">${srGrammarHTML(ex[lang] || ex.en)}</span>
        </li>
      `;
    }).join('');
    return `
      <article class="wrinkle${w.wide ? ' wide' : ''}">
        <h3>${title}</h3>
        <p class="lede">${intro}</p>
        <ul class="wrinkle-list">${items}</ul>
      </article>
    `;
  }).join('');
}

function renderPairs() {
  const ul = document.getElementById('pairList');
  if (!ul) return;
  const lang = currentLang();
  const d = dict();
  ul.innerHTML = PAIRS.map(pair => {
    const eyebrow = pair.featured
      ? `<span class="pair-eyebrow">${d['cases.pairs.featured.eyebrow'] || ''}</span>`
      : '';
    return `
      <li class="pair${pair.featured ? ' pair-featured' : ''}"
          ${pair.featured ? `data-tone-a="${pair.a.case.toLowerCase()}" data-tone-b="${pair.b.case.toLowerCase()}"` : ''}>
        ${eyebrow}
        <div class="pair-row">
          <div class="pair-side" data-tone="${pair.a.case.toLowerCase()}">
            <span class="pair-prep">${srText(pair.a.p)}</span>
            <span class="pair-case">${pair.a.case}</span>
            <span class="pair-gloss">${pair.a[lang] || pair.a.en}</span>
          </div>
          <span class="pair-arrow" aria-hidden="true">↔</span>
          <div class="pair-side" data-tone="${pair.b.case.toLowerCase()}">
            <span class="pair-prep">${srText(pair.b.p)}</span>
            <span class="pair-case">${pair.b.case}</span>
            <span class="pair-gloss">${pair.b[lang] || pair.b.en}</span>
          </div>
        </div>
        <p class="pair-note">${srEmHTML(pair[lang] || pair.en)}</p>
      </li>`;
  }).join('');
}

function renderAll() {
  renderStaticGrammarTokens();
  renderCaseStrip();
  renderCast();
  renderCases();
  renderIDecl();
  renderWrinkles();
  renderPairs();
}

function updateStickyOffset() {
  const header = document.querySelector('header.nav');
  const strip  = document.querySelector('.case-strip');
  const navHeight = header ? header.offsetHeight : 0;
  const stickyOffset = navHeight + (strip ? strip.offsetHeight : 0);
  document.documentElement.style.setProperty('--nav-height', navHeight + 'px');
  document.documentElement.style.setProperty('--sticky-offset', stickyOffset + 'px');
}

/* Case strip visibility — the strip labels only the case card. Once readers
   move into standalone extra sections, hide it on downward scroll and bring it
   back as soon as they scroll up toward the case card again. */
function setupCaseStripVisibility() {
  const strip = document.querySelector('.case-strip');
  const header = document.querySelector('header.nav');
  if (!strip) return;

  let lastY = window.scrollY || window.pageYOffset || 0;
  let ticking = false;
  let initialized = false;
  let pointerFocused = false;

  function setHidden(hidden) {
    strip.classList.toggle('is-hidden', hidden);
    strip.setAttribute('aria-hidden', hidden ? 'true' : 'false');
    strip.querySelectorAll('a').forEach(a => { a.tabIndex = hidden ? -1 : 0; });
  }

  function update() {
    ticking = false;
    const y = window.scrollY || window.pageYOffset || 0;
    const scrollingDown = y > lastY + 2;
    const scrollingUp = y < lastY - 2;
    const activeCase = document.querySelector('#caseList .case.is-active');
    const headerHeight = header ? header.offsetHeight : 0;
    const passedCaseCard = activeCase
      ? activeCase.getBoundingClientRect().bottom <= headerHeight + 12
      : false;

    const keyboardFocusInStrip = strip.matches(':focus-within') && !pointerFocused;

    if (scrollingUp || !passedCaseCard || keyboardFocusInStrip) {
      setHidden(false);
    } else if ((scrollingDown || !initialized) && passedCaseCard) {
      setHidden(true);
    }

    lastY = y;
    initialized = true;
  }

  window.addEventListener('scroll', () => {
    if (!ticking) {
      ticking = true;
      requestAnimationFrame(update);
    }
  }, { passive: true });
  window.addEventListener('resize', update);
  strip.addEventListener('pointerdown', () => { pointerFocused = true; });
  strip.addEventListener('keydown', () => { pointerFocused = false; });
  strip.addEventListener('focusin', () => setHidden(false));
  strip.addEventListener('focusout', () => { pointerFocused = false; });
  update();
}

/* Cell popovers — tap any endings cell to see the abstract ending become a
   concrete word transformation. Reuses the .tip-pop / .tip-pop-card pattern
   from the alphabet chart. */
(function setupCellPopover(){
  const pop = document.getElementById('casePop');
  if (!pop) return;
  const bodyEl   = pop.querySelector('#casePopBody');
  const closeBtn = pop.querySelector('.tip-pop-close');
  let active = null;

  function position() {
    if (!active) return;
    const r = active.getBoundingClientRect();
    const sx = window.scrollX || window.pageXOffset;
    const sy = window.scrollY || window.pageYOffset;
    pop.style.left = '0px'; pop.style.top = '0px';
    const pw = pop.offsetWidth, ph = pop.offsetHeight;
    const gutter = 12;
    const vw = document.documentElement.clientWidth;
    let left = r.left + sx + r.width/2 - pw/2;
    left = Math.max(sx + gutter, Math.min(left, sx + vw - pw - gutter));
    const spaceBelow = window.innerHeight - r.bottom;
    const placeAbove = spaceBelow < ph + gutter && r.top > ph + gutter;
    const top = placeAbove ? r.top + sy - ph - 8 : r.bottom + sy + 8;
    pop.style.left = left + 'px';
    pop.style.top  = top  + 'px';
    pop.dataset.placement = placeAbove ? 'above' : 'below';
  }

  function open(trigger) {
    const caseIdx = +trigger.getAttribute('data-case-idx');
    const gender  = trigger.getAttribute('data-gender');
    const number  = trigger.getAttribute('data-number');
    if (isNaN(caseIdx) || !gender || !number) return;
    const c = CASES[caseIdx];
    pop.dataset.tone = c && c.tone || '';
    if (active && active !== trigger) active.setAttribute('aria-expanded','false');
    active = trigger;
    trigger.setAttribute('aria-expanded','true');
    bodyEl.innerHTML = popoverHTML(caseIdx, gender, number);
    pop.hidden = false;
    requestAnimationFrame(() => { position(); pop.classList.add('is-open'); });
  }

  function close() {
    if (!active) return;
    active.setAttribute('aria-expanded','false');
    active = null;
    pop.classList.remove('is-open');
    pop.hidden = true;
  }

  document.addEventListener('click', (e) => {
    const trigger = e.target.closest('[data-cell-trigger]');
    if (trigger) {
      e.preventDefault();
      if (active === trigger) close(); else open(trigger);
      return;
    }
    if (!pop.hidden && !pop.contains(e.target)) close();
  });

  closeBtn.addEventListener('click', close);
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') close(); });
  window.addEventListener('resize', () => { if (!pop.hidden) position(); });
  window.addEventListener('scroll', () => { if (!pop.hidden) position(); }, { passive: true });
  document.addEventListener('langchange', close);
})();

/* Tabs — only one case article is visible at a time. The case-strip is the
   tab bar; bird's-eye tiles, "Meet the cast" cells, and any `#case-N` link
   also switch tabs. Footnote anchors (`#case-2-n-sib-i`) keep default behaviour. */
function activeCaseFromHash() {
  const h = (location.hash || '').replace(/^#/, '');
  const idx = CASES.findIndex(c => caseAnchor(c.key) === h);
  return idx >= 0 ? idx : 0;
}

function showCase(idx, { scroll = false, smooth = true, updateHash = true } = {}) {
  if (idx < 0 || idx >= CASES.length) idx = 0;
  const targetId = caseAnchor(CASES[idx].key);
  document.querySelectorAll('#caseList .case').forEach(el => {
    el.classList.toggle('is-active', el.id === targetId);
  });
  document.querySelectorAll('.case-strip-cell').forEach(cell => {
    const a = cell.querySelector('a');
    const match = !!a && a.getAttribute('href') === '#' + targetId;
    cell.classList.toggle('is-current', match);
    if (a) a.setAttribute('aria-selected', match ? 'true' : 'false');
  });
  if (updateHash && location.hash !== '#' + targetId) {
    history.pushState(null, '', '#' + targetId);
  }
  if (scroll) {
    const el = document.getElementById(targetId);
    if (el) {
      const off = parseInt(getComputedStyle(document.documentElement)
        .getPropertyValue('--sticky-offset')) || 0;
      const top = el.getBoundingClientRect().top + window.scrollY - off - 12;
      window.scrollTo({ top, behavior: smooth ? 'smooth' : 'auto' });
    }
  }
}

function setupTabs() {
  document.addEventListener('click', (e) => {
    if (e.button !== 0 || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey) return;
    const a = e.target.closest('a');
    if (!a) return;
    const m = (a.getAttribute('href') || '').match(/^#(case-\d+)$/);
    if (!m) return;
    const idx = CASES.findIndex(c => caseAnchor(c.key) === m[1]);
    if (idx < 0) return;
    e.preventDefault();
    showCase(idx, { scroll: true });
  });
  window.addEventListener('popstate', () => {
    showCase(activeCaseFromHash(), { updateHash: false, scroll: true });
  });
}

document.addEventListener('langchange', () => {
  renderAll();
  updateStickyOffset();
  showCase(activeCaseFromHash(), { updateHash: false });
});
document.addEventListener('scriptchange', () => {
  renderAll();
  updateStickyOffset();
  showCase(activeCaseFromHash(), { updateHash: false });
});
window.addEventListener('resize', updateStickyOffset);
window.addEventListener('load', updateStickyOffset);
renderAll();
updateStickyOffset();
setupTabs();
showCase(activeCaseFromHash(), { scroll: !!location.hash, smooth: false, updateHash: false });
setupCaseStripVisibility();
</script>
