<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="description" content="The Serbian alphabet — Cyrillic and Latin, side by side. With IPA, examples, and translations.">
<title>The two alphabets — Atlas Srpski</title>

<script src="../assets/theme-init.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="../assets/styles.css">
</head>
<body>

<header class="nav">
  <div class="shell nav-inner">
    <a href="/" class="brand">
      <span class="brand-mark">A.</span>
      <span data-i18n="nav.brand">Atlas Srpski</span>
    </a>
    <div class="nav-actions">
      <div class="nav-controls" role="group" aria-label="Language">
        <button class="chip" data-lang-chip="en" aria-pressed="true">EN</button>
        <button class="chip" data-lang-chip="ru" aria-pressed="false">RU</button>
      </div>
      <div class="nav-controls script-controls" role="group" aria-label="Serbian script">
        <button class="chip script-chip" data-script-chip="lat" aria-pressed="true" aria-label="Use Latin script">Ć</button>
        <button class="chip script-chip" data-script-chip="cyr" aria-pressed="false" aria-label="Use Cyrillic script">Ћ</button>
      </div>
      <button class="theme-btn" data-theme-toggle aria-label="Toggle theme" data-i18n-attr="aria-label:nav.theme">
        <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path></svg>
        <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"></path></svg>
      </button>
    </div>
  </div>
</header>

<section class="alph-section">
  <div class="shell">
    <div class="alph-legend reveal">
      <span><span class="alph-mark unique">SR</span><span data-i18n="alph.legend.unique">Unique to Serbian</span></span>
      <span><span class="alph-mark diff">!=</span><span data-i18n="alph.legend.diff">Looks Latin, sounds different</span></span>
    </div>

    <div class="alph-grid reveal" id="alphGrid" aria-label="Serbian alphabet"></div>
  </div>
</section>

<div class="tip-pop" id="tipPop" role="dialog" aria-modal="false" hidden>
  <div class="tip-pop-card">
    <p class="tip-pop-body" id="tipPopBody"></p>
    <button type="button" class="tip-pop-close" aria-label="Close" data-i18n-attr="aria-label:alph.tip.close">×</button>
  </div>
</div>
