  <div class="shell">
    <div class="pron-layout reveal">
      <section class="pron-panel pron-personal" data-tone="pron-personal">
        <header class="pron-panel-head">
          <span class="pron-kicker" data-i18n="pron.personal.kicker">Core grid</span>
          <h3 data-i18n="pron.personal.title">Personal pronouns</h3>
        </header>
        <div class="pron-table-wrap" id="personalPronouns"></div>
      </section>

      <section class="pron-panel" data-tone="pron-poss">
        <header class="pron-panel-head">
          <span class="pron-kicker" data-i18n="pron.possessive.kicker">Adjective forms</span>
          <h3 data-i18n="pron.possessive.title">Possessives</h3>
        </header>
        <div class="pron-card-grid" id="possessives"></div>
      </section>

      <section class="pron-panel" data-tone="pron-demo">
        <header class="pron-panel-head">
          <span class="pron-kicker" data-i18n="pron.demo.kicker">Near / middle / far</span>
          <h3 data-i18n="pron.demo.title">Demonstratives</h3>
        </header>
        <div class="pron-demo-pack" id="demonstratives"></div>
      </section>

      <section class="pron-panel" data-tone="pron-question">
        <header class="pron-panel-head">
          <span class="pron-kicker" data-i18n="pron.question.kicker">Question words</span>
          <h3 data-i18n="pron.question.title">Who, what, whose?</h3>
        </header>
        <div class="pron-question-pack" id="questions"></div>
      </section>
    </div>
  </div>
</section>

<script src="../assets/app.js"></script>

<script>
const PERSONAL = [
  { band:'self', label:'pron.self', subject:'-', object:'sebe, se', datloc:'sebi, si', inst:'sobom', poss:'svoj' },
  { band:'sg', label:'pron.1sg', subject:'ja', object:'mene, me', datloc:'meni, mi', inst:'mnom', poss:'moj' },
  { band:'sg', label:'pron.2sg', subject:'ti', object:'tebe, te', datloc:'tebi, ti', inst:'tobom', poss:'tvoj' },
  { band:'sg', label:'pron.3msg', subject:'on', object:'njega, ga', datloc:'njemu, mu', inst:'njim', poss:'njegov' },
  { band:'sg', label:'pron.3nsg', subject:'ono', object:'njega, ga', datloc:'njemu, mu', inst:'njim', poss:'njegov' },
  { band:'sg', label:'pron.3fsg', subject:'ona', object:'nju / nje, je / ju', datloc:'njoj, joj', inst:'njom', poss:'njen' },
  { band:'pl', label:'pron.1pl', subject:'mi', object:'nas', datloc:'nama, nam', inst:'nama', poss:'naš' },
  { band:'pl', label:'pron.2pl', subject:'vi', object:'vas', datloc:'vama, vam', inst:'vama', poss:'vaš' },
  { band:'pl', label:'pron.3mpl', subject:'oni', object:'njih, ih', datloc:'njima, im', inst:'njima', poss:'njihov' },
  { band:'pl', label:'pron.3npl', subject:'ona', object:'njih, ih', datloc:'njima, im', inst:'njima', poss:'njihov' },
  { band:'pl', label:'pron.3fpl', subject:'one', object:'njih, ih', datloc:'njima, im', inst:'njima', poss:'njihov' },
];

const POSSESSIVES = [
  { owner:'pron.self.owner', forms:['svoj', 'svoje', 'svoja'], note:'pron.self.note' },
  { owner:'pron.my', forms:['moj', 'moje', 'moja'] },
  { owner:'pron.your.sg', forms:['tvoj', 'tvoje', 'tvoja'] },
  { owner:'pron.his.its', forms:['njegov', 'njegovo', 'njegova'] },
  { owner:'pron.her', forms:['njen', 'njeno', 'njena'] },
  { owner:'pron.our', forms:['naš', 'naše', 'naša'] },
  { owner:'pron.your.pl', forms:['vaš', 'vaše', 'vaša'] },
  { owner:'pron.their', forms:['njihov', 'njihovo', 'njihova'] },
];

const DEMOS = [
  {
    title:'pron.demo.sg',
    rows:[
      { key:'pron.this', forms:['ovaj', 'ovo', 'ova'] },
      { key:'pron.that', forms:['taj', 'to', 'ta'] },
      { key:'pron.over.there', forms:['onaj', 'ono', 'ona'] },
    ]
  },
  {
    title:'pron.demo.pl',
    rows:[
      { key:'pron.these', forms:['ovi', 'ova', 'ove'] },
      { key:'pron.those', forms:['ti', 'ta', 'te'] },
      { key:'pron.those.far', forms:['oni', 'ona', 'one'] },
    ]
  }
];

const QUESTIONS = {
  whose: [
    { label:'pron.sg', forms:['čiji', 'čije', 'čija'] },
    { label:'pron.pl', forms:['čiji', 'čija', 'čije'] },
  ],
  whoWhat: [
    { key:'case.1.name', who:'ko', what:'šta' },
    { key:'case.4.name', who:'koga', what:'šta' },
    { key:'case.2.name', who:'koga', what:'čega' },
    { key:'pron.datloc', who:'kome', what:'čemu' },
    { key:'case.6.name', who:'kim', what:'čim' },
  ]
};

function dict() {
  const lang = document.documentElement.getAttribute('lang') || 'en';
  return (window.I18N && window.I18N[lang]) || {};
}
function t(key) { return dict()[key] || key; }
function srText(text) {
  return window.AtlasSrpski ? window.AtlasSrpski.sr(text) : String(text);
}

function personalCell(value) {
  if (value === '-') return '<span class="pron-dash">-</span>';
  const parts = value.split(',').map(part => part.trim());
  return parts.map((part, idx) => `
    <span class="${idx === 0 ? 'pron-long' : 'pron-short'}">${srText(part)}</span>
  `).join('<span class="pron-comma">,</span> ');
}

function renderPersonal() {
  const root = document.getElementById('personalPronouns');
  if (!root) return;
  const columns = [
    ['pron.subject', 'subject'],
    ['pron.accgen', 'object'],
    ['pron.datloc', 'datloc'],
    ['case.6.name', 'inst'],
    ['pron.poss.short', 'poss'],
  ];
  const rows = PERSONAL.map(row => `
    <tr data-band="${row.band}">
      <th scope="row">
        <span class="pron-person-label">${t(row.label)}</span>
        <span class="pron-subject">${srText(row.subject)}</span>
      </th>
      ${columns.slice(1).map(([key, prop]) => `<td data-label="${t(key)}">${personalCell(row[prop])}</td>`).join('')}
    </tr>
  `).join('');

  root.innerHTML = `
    <table class="pron-table">
      <thead>
        <tr>
          ${columns.map(([key]) => `<th scope="col">${t(key)}</th>`).join('')}
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="pron-rule-row">
      <p><strong>${t('pron.long.short')}</strong> ${t('pron.long.short.rule')}</p>
      <p><strong>${srText('svoj')}</strong> ${t('pron.svoj.rule')}</p>
    </div>
  `;
}

function renderPossessives() {
  const root = document.getElementById('possessives');
  if (!root) return;
  root.innerHTML = `
    <div class="pron-mini-head" aria-hidden="true">
      <span></span><span>${t('cases.gender.m')}</span><span>${t('cases.gender.n')}</span><span>${t('cases.gender.f')}</span>
    </div>
    ${POSSESSIVES.map(item => `
      <article class="pron-poss-card">
        <h4>${t(item.owner)}</h4>
        <div class="pron-gender-row">
          ${item.forms.map(form => `<span>${srText(form)}</span>`).join('')}
        </div>
        ${item.note ? `<p>${t(item.note)}</p>` : ''}
      </article>
    `).join('')}
  `;
}

function genderHead() {
  return `<div class="pron-mini-head pron-genders" aria-hidden="true">
    <span></span><span>${t('cases.gender.m')}</span><span>${t('cases.gender.n')}</span><span>${t('cases.gender.f')}</span>
  </div>`;
}

function renderDemonstratives() {
  const root = document.getElementById('demonstratives');
  if (!root) return;
  root.innerHTML = DEMOS.map(group => `
    <section class="pron-demo-group">
      <h4>${t(group.title)}</h4>
      ${genderHead()}
      <div class="pron-matrix">
        ${group.rows.map(row => `
          <div class="pron-matrix-row">
            <span class="pron-row-label">${t(row.key)}</span>
            ${row.forms.map(form => `<span class="pron-form">${srText(form)}</span>`).join('')}
          </div>
        `).join('')}
      </div>
    </section>
  `).join('') + `
    <div class="pron-rule-row">
      <p><strong>${srText('Ovo je...')}</strong> ${t('pron.demo.predicate')}</p>
      <p><strong>${srText('Ovaj pas')}</strong> ${t('pron.demo.noun.rule')}</p>
    </div>
  `;
}

function renderQuestions() {
  const root = document.getElementById('questions');
  if (!root) return;
  root.innerHTML = `
    <section class="pron-question-block">
      <h4>${t('pron.whose')}</h4>
      ${genderHead()}
      <div class="pron-matrix">
        ${QUESTIONS.whose.map(row => `
          <div class="pron-matrix-row">
            <span class="pron-row-label">${t(row.label)}</span>
            ${row.forms.map(form => `<span class="pron-form">${srText(form)}</span>`).join('')}
          </div>
        `).join('')}
      </div>
    </section>
    <section class="pron-question-block">
      <h4>${t('pron.who.what')}</h4>
      <div class="pron-kw-table">
        <div class="pron-kw-head"><span></span><span>${t('pron.who')}</span><span>${t('pron.what')}</span></div>
        ${QUESTIONS.whoWhat.map(row => `
          <div class="pron-kw-row">
            <span>${t(row.key)}</span>
            <span>${srText(row.who)}</span>
            <span>${srText(row.what)}</span>
          </div>
        `).join('')}
      </div>
    </section>
  `;
}

function renderPronouns() {
  renderPersonal();
  renderPossessives();
  renderDemonstratives();
  renderQuestions();
}

document.addEventListener('langchange', renderPronouns);
document.addEventListener('scriptchange', renderPronouns);
renderPronouns();
</script>
</body>
</html>
